name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3018: apk add without pinned version - fine for base image tags
          ignore: DL3018

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.json }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # PR builds still get validated on both platforms, they just
          # don't get pushed anywhere (build-push-action requires
          # load=false for multi-platform, so PRs can't docker run this
          # locally in-job - that's what the smoke-test job below is for
          # on push events).

  smoke-test:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container and check it comes up
        run: |
          docker run -d --name baikal-smoke -p 8080:80 \
            ${{ fromJSON(needs.build.outputs.image).tags[0] }}

          # Hit /admin/ (the install wizard) rather than / - root sometimes
          # redirects, and -L follows that, but we want to assert on the
          # page Baikal actually serves once it's up.
          code=000
          for i in $(seq 1 20); do
            code=$(curl -sL -o /dev/null -w '%{http_code}' http://localhost:8080/admin/ || true)
            if [ "$code" = "200" ]; then
              echo "Got HTTP 200 after ${i} tries"
              break
            fi
            sleep 1
          done

          docker logs baikal-smoke
          test "$code" = "200"

      - name: Tear down
        if: always()
        run: docker rm -f baikal-smoke || true
