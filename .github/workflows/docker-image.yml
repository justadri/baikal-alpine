name: Docker Image CI

on:
  push:
    branches: ["main"]
    tags: ["*.*.*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE_NAME: justadri/baikal-alpine

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3018: apk add without pinned version - fine for base image tags
          ignore: DL3018

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.json }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          # Deliberately not secrets.DOCKERHUB_USERNAME: it's public anyway
          # (it's the tag namespace), and having it registered as a secret
          # causes GitHub to mask/block the metadata JSON job output below,
          # since "justadri" legitimately also appears in the image tags.
          username: justadri
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # On a version tag push (e.g. "0.11.1"), bake that exact Baikal
          # version into the image instead of relying on the Dockerfile's
          # ARG default staying in sync. Empty string on non-tag builds
          # means no override, so the Dockerfile default still applies.
          build-args: |
            ${{ startsWith(github.ref, 'refs/tags/') && format('BAIKAL_VERSION={0}', github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # PR builds still get validated on both platforms, they just
          # don't get pushed anywhere (build-push-action requires
          # load=false for multi-platform, so PRs can't docker run this
          # locally in-job - that's what the smoke-test job below is for
          # on push events).

  smoke-test:
    needs: build
    # Explicit `if:` overrides the default "only run if needs succeeded"
    # check, so success() has to be spelled out here or this'll try to run
    # (and blow up on an empty needs.build.outputs.image) even when build
    # fails.
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run container and check it comes up
        run: |
          docker run -d --name baikal-smoke -p 8080:80 \
            ${{ fromJSON(needs.build.outputs.image).tags[0] }}

          # Hit /admin/ (the install wizard) rather than / - root sometimes
          # redirects, and -L follows that, but we want to assert on the
          # page Baikal actually serves once it's up.
          code=000
          for i in $(seq 1 20); do
            code=$(curl -sL -o /dev/null -w '%{http_code}' http://localhost:8080/admin/ || true)
            if [ "$code" = "200" ]; then
              echo "Got HTTP 200 after ${i} tries"
              break
            fi
            sleep 1
          done

          docker logs baikal-smoke
          test "$code" = "200"

      - name: Tear down
        if: always()
        run: docker rm -f baikal-smoke || true

  dockerhub-description:
    needs: build
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v5
        with:
          username: justadri
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE_NAME }}
          short-description: "Baikal (CalDAV/CardDAV) on PHP 8.4 + nginx + Alpine, s6-supervised"
          readme-filepath: ./README.md
