; Override the default www pool: run as the nginx user/group so file
; ownership matches (Baikal files are chowned to nginx:nginx in the
; Dockerfile), and listen on a unix socket instead of TCP:9000.

[www]
user = nginx
group = nginx

listen = /run/php-fpm.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

; clear_env=no lets php-fpm see env vars like SMTP_* passed to the
; container without needing to explicitly whitelist each one.
clear_env = no
