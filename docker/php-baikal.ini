; Route PHP's mail() (and libraries that shell out to sendmail, e.g.
; PHPMailer/Symfony Mailer in sendmail mode) through msmtp.
sendmail_path = "/usr/bin/msmtp -t"

; Reasonable defaults for CalDAV/CardDAV sync payloads and file imports.
upload_max_filesize = 32M
post_max_size = 32M
memory_limit = 256M

; opcache: fine for a single long-lived container; bump revalidate_freq
; or disable validate_timestamps if you're not editing files in place.
opcache.enable = 1
opcache.memory_consumption = 64
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
